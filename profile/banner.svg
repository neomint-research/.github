<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="NeoMINT Research — Open research for a safer digital world">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00202B"></stop>
      <stop offset="0.55" stop-color="#003B44"></stop>
      <stop offset="1" stop-color="#00202B"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#00958F" stop-opacity="0.55"></stop>
      <stop offset="1" stop-color="#00958F" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0v32" fill="none" stroke="rgba(139,166,165,0.10)" stroke-width="1"></path>
    </pattern>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00958F" stop-opacity="0"></stop>
      <stop offset="0.5" stop-color="#00958F" stop-opacity="0.9"></stop>
      <stop offset="1" stop-color="#00958F" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"></rect>
  <rect width="1280" height="320" fill="url(#grid)"></rect>
  <rect width="1280" height="320" fill="url(#glow)"></rect>

  <g opacity="0.5" stroke="url(#wave)" fill="none" stroke-width="1.2">
    <path d="M0 80 Q 320 40 640 80 T 1280 80"></path>
    <path d="M0 140 Q 320 100 640 140 T 1280 140" opacity="0.7"></path>
    <path d="M0 200 Q 320 160 640 200 T 1280 200" opacity="0.5"></path>
    <path d="M0 260 Q 320 220 640 260 T 1280 260" opacity="0.35"></path>
  </g>

  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="72" y="140" font-size="64" font-weight="700" letter-spacing="-1.5">NeoMINT<tspan fill="#00958F">.</tspan>research</text>
    <text x="74" y="182" font-size="22" font-weight="400" opacity="0.85">Open research for a safer digital world.</text>
    <g font-size="13" font-weight="600" letter-spacing="1.2">
      <rect x="72" y="216" width="142" height="30" fill="none" stroke="rgba(139,166,165,0.55)"></rect>
      <text x="143" y="236" text-anchor="middle">CYBERSECURITY</text>
      <rect x="224" y="216" width="108" height="30" fill="none" stroke="rgba(139,166,165,0.55)"></rect>
      <text x="278" y="236" text-anchor="middle">ISO 27001</text>
      <rect x="342" y="216" width="180" height="30" fill="none" stroke="rgba(139,166,165,0.55)"></rect>
      <text x="432" y="236" text-anchor="middle">BSI IT-GRUNDSCHUTZ</text>
      <rect x="532" y="216" width="86" height="30" fill="none" stroke="rgba(139,166,165,0.55)"></rect>
      <text x="575" y="236" text-anchor="middle">NIS 2</text>
    </g>
  </g>

  <g transform="translate(1040 80)" stroke="#00958F" fill="none" stroke-width="2.5">
    <rect x="20" y="60" width="140" height="110" rx="4"></rect>
    <path d="M50 60 V35 a40 40 0 0 1 80 0 V60"></path>
    <circle cx="90" cy="115" r="10" fill="#00958F" stroke="none"></circle>
    <rect x="86" y="120" width="8" height="22" fill="#00958F" stroke="none"></rect>
  </g>
  <g transform="translate(1040 80)" opacity="0.35" stroke="#8BA6A5" fill="none" stroke-width="1">
    <circle cx="90" cy="115" r="80"></circle>
    <circle cx="90" cy="115" r="110"></circle>
  </g>
</svg>
